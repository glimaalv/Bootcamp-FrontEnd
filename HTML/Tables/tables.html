<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trabalhando com Tabelas</title>
    <style>
      table {
        -webkit-box-shadow: 12px 14px 6px 5px rgba(0, 0, 0, 0.24);
        box-shadow: 12px 14px 6px 5px rgba(0, 0, 0, 0.24);
        border: solid 1px grey;
      }
      table tbody tr:nth-child(even) {
        background-color: rgb(183, 183, 183);
      }
      table tr:hover {
        background-color: grey;
      }
      table thead th {
        background-color: black;
        color: aliceblue;
      }
      table tfoot td {
        background-color: gray;
      }
    </style>
  </head>

  <body>
    <!-- Tag summary á apenas para acessibilidade de leitores de tela -->
    <table
      summary="Tabela de Idades e Nomes"
      width="300"
      align="center"
      cellspacing="0"
      cellpadding="5"
    >
      <!-- Caption é o Título da Tabela -->
      <caption>
        Tabela de Idades e Nomes
      </caption>
      <thead>
        <tr>
          <th colspan="2">Minha Tabela</th>
        </tr>
      </thead>
      <!-- TR são linhas (rows), TD são colunas e TH é o header-->
      <thead>
        <tr>
          <th title="nome completo">Nome</th>
          <th>Idade</th>
        </tr>
      </thead>
      <tbody>
        <tr id="1">
          <td>Gustavo</td>
          <td>21</td>
        </tr>
        <tr id="2">
          <td>Ana</td>
          <td>19</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td>Total</td>
          <td>2</td>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
