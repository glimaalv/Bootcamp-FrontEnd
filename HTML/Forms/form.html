<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <!-- <label for="nomeUsuario">Text: </label> 
    <input type="text" id="nomeUsuario" name="nomeUsuario"> <br> 
    Essa é a forma correta de estruturar os labels de um formulário -->
    <form action="" method="get">
        <label for="">Text: </label> <input type="text"> <br>
        <label for="">Number: </label> <input type="number" min="0" max="99" step="5"> <br>
        <label for="">Range: </label> <input type="range"> <br>
        <label for="">Color: </label> <input type="color"> <br>
        <label for="">E-mail: </label> <input type="email"> <br>
        <label for="">Data: </label> <input type="date"> <br>
        <label for="">Mês: </label> <input type="month"> <br>
        <label for="">Hidden: </label> <input type="hidden"> <br>
        <!-- Fica invisível mas é enviado por baixo dos panos -->
        <label for="">File: </label> <input type="file"> <br>
        <select name="role" id="">
            <option selected value="">Selecione o Cargo:</option>
            <option value="developer">Developer</option>
            <option value="engineer">Engineer</option>
        </select><br>
        <label for="">Button: </label> <input type="button" value="Enviar">
    </form>
</body>

</html>
