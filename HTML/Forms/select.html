<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select</title>
</head>
<body>
    <form action="" method="get">
        <label for="">Nome: </label><input type="text" name="name"><br>
        <label for="">Cargo: </label>
        <!-- o select também pode ser multiple para selecionar diversas opções -->
        <select name="role" id="">
            <option selected value="">Selecione o Cargo:</option>
            <option value="developer">Developer</option>
            <option value="engineer">Engineer</option>
        </select>
        <br>
        <label for="">Assunto: </label><input type="text" name="subject"><br>
        
        <textarea rows="10" cols="50" name="message" id=""></textarea>
    </form>
</body>
</html>
