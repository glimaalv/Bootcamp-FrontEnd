<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckBox E RadioButton</title>
</head>
<body>
    <form action="" method="get">
        <h3>Você selecionou: Pizza 3 Queijos</h3>
        <p>Quais opcionais você deseja?</p>
        <input type="checkbox" disabled name="opcional[]" value="Queijo"> + Queijo <br>
        <input type="checkbox" name="opcional[]" value="Cebola"> + Cebola <br>
        <input type="checkbox" name="opcional[]" value="Calabresa"> + Calabresa <br>
        <input type="checkbox" name="opcional[]" value="Azeitona"> + Azeitona <br>
        <!-- os colchetes sinalizam pro backend que se trata de uma lista e não de uma variável isolada -->
        <!-- sem isso apenas a última variável seria lida -->
        <!-- $opcional["queijo", "cebola"]; (como chega ao back) -->
        <p>Borda Recheada?</p>
        <input type="radio" name="borda" id="" value="Sim"> Sim <br>
        <input type="radio" name="borda" id="" value="Não"> Não <br>
    </form>
</body>
</html>
