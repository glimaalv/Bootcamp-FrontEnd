<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button</title>
</head>
<body>
    <form action="" method="get">
        <label for="">Nome: </label><input type="text" name="name"><br>
        <label for="">Idade: </label><input type="number" name="age"><br>
        <label for="">Senha: </label><input type="password" name="password"><br>

        <!-- Sem JavaScript é apenas um botão clicável, não faz nada -->
        <button type="button">Clicável</button> 
        <!-- Limpa os campos do form que ele está incluído -->
        <button type="reset">Limpar</button>
         <!-- Envia o formulário em que ele está incluído e roda o evento "onsubmit" -->
        <button type="submit">Enviar</button> 
    </form>
</body>
</html>
