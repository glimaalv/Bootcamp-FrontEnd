<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div e Span</title>
    <!-- Não é bom colocar o CSS junto com o HTML -->
     <style>
        span{
            color : purple;
            font-weight : bold;
            font-family: Arial, Helvetica, sans-serif;
        }
     </style>
</head>
<body>
    <!-- Se eu quiser formatar apenas uma parte do texto, o css não permite diretamente, apenas por meio de tag -->
    <p>Dio.<span>me</span></p>

    <!-- Div é uma divisão lógica do HTML -->
</body>
</html>
